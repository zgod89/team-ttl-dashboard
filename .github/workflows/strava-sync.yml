name: Strava Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel sync function
        run: |
          curl -X GET https://team-ttl-dashboard.vercel.app/api/strava/sync \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
