name: TTL — Race Scraper & Strava Sync

on:
  schedule:
    - cron: '0 6 * * *'   # Race scraper: 6am UTC daily
    - cron: '0 * * * *'   # Strava sync:  every hour
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

jobs:
  race-scraper:
    name: Race Scraper
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run race scraper
        run: cd backend && node scraper.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIATHLON_API_KEY:    ${{ secrets.TRIATHLON_API_KEY }}
          WHATSAPP_TOKEN:       ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID:    ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_CHANNEL_ID:  ${{ secrets.WHATSAPP_CHANNEL_ID }}

  strava-sync:
    name: Strava Sync
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run Strava sync
        run: cd backend && node strava-sync.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
